<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Simulasi Model Atom</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        html, body{
            margin:0;
            padding:0;
            width:100%;
            overflow:hidden;
        }

        canvas{
            display:block;
            width:100%;
            height:100%;
            top:0;
            left:0;
            z-index:0;
        }

        body{
            margin:0;
            overflow:hidden;
            font-family:Arial;
            background:linear-gradient(180deg,#020024,#090979,#000);
            color:white;
        }

        #sceneContainer{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            z-index:0;
        }

        #judul{
            position:absolute;
            top:15px;
            width:100%;
            text-align:center;
            font-size:26px;
            z-index: 10;
        }

        /* DEFAULT (desktop tetap bagus) */
        #menu{
            position:absolute;
            top:20px;
            left:50%;
            transform:translateX(-50%);
            display:flex;
            flex-wrap:wrap; /* penting */
            justify-content:center;
            gap:10px;
            max-width:90%;
            background:rgba(255,255,255,0.1);
            padding:10px 15px;
            border-radius:12px;
            backdrop-filter:blur(12px);
            z-index: 10;
        }

        button{
            padding:8px 14px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            background:rgba(255,255,255,0.2);
            color:white;
            font-size:14px;
            transition:0.3s;
        }

        button:hover{
            background:#4da6ff;
        }

        button:last-child{
            background:#ff4d4d;
        }

        button:last-child:hover{
            background:#ff1a1a;
        }

        a{
            text-decoration: none;
        }

        #penjelasan{
            position:absolute;
            bottom:30px;
            left:50%;
            transform:translateX(-50%);
            width:400px;
            background:rgba(255,255,255,0.1);
            padding:20px;
            border-radius:10px;
            text-align:center;
            z-index: 10;
        }

        #popup{
            position:absolute;
            display:none;
            background:rgba(0,0,0,0.85);
            color:white;
            padding:12px 16px;
            border-radius:8px;
            font-size:14px;
            pointer-events:none;
            z-index:20;
        }

        /* HAMBURGER (default hidden di desktop) */
        #hamburger{
            display:none;
        }

        /* POPUP MENU */
        #menuPopup{
            display:none;
        }

        /* 📱 MODE HP */
        @media (max-width: 600px){
            #judul{
                font-size:18px;
                top:10px;
            }


            /* sembunyikan menu lama */
            #menu{
                display:none;
            }

            /* ===== HAMBURGER BUTTON ===== */
            #hamburger{
                display:flex;
                position:fixed;
                bottom:20px;
                left:50%;
                transform:translateX(-50%);

                width:55px;
                height:55px;

                background:rgba(0,0,0,0.6);
                color:white;
                font-size:24px;

                align-items:center;
                justify-content:center;

                border-radius:50%;
                backdrop-filter:blur(10px);

                box-shadow:0 0 15px rgba(0,0,0,0.4);
                cursor:pointer;

                transition:0.25s;
                z-index:999;
            }

            /* ✨ HOVER */
            #hamburger:hover{
                background:#4da6ff;
                transform:translateX(-50%) scale(1.1);
                box-shadow:0 0 20px #4da6ff;
            }

            /* 🔥 ACTIVE (saat diklik) */
            #hamburger:active{
                transform:translateX(-50%) scale(0.95);
                box-shadow:0 0 10px #4da6ff;
            }

            /* ===== POPUP MENU ===== */
            #menuPopup{
                position:fixed;
                bottom:90px;
                left:50%;
                transform:translateX(-50%) scale(0.8);

                display:flex;
                flex-direction:column;
                gap:8px;

                background:rgba(0,0,0,0.7);
                padding:15px;
                border-radius:15px;

                backdrop-filter:blur(12px);

                opacity:0;
                pointer-events:none;

                transition:0.3s;
                z-index:998;
            }

            #menuPopup.active{
                opacity:1;
                transform:translateX(-50%) scale(1);
                pointer-events:auto;
            }

            /* ===== BUTTON UMUM ===== */
            #menuPopup button{
                padding:8px 14px;
                font-size:13px;
                border-radius:8px;
                background:rgba(255,255,255,0.2);
                color:white;

                transition:0.25s;
            }

            /* ✨ HOVER BUTTON */
            #menuPopup button:hover{
                background:#4da6ff;
                transform:translateY(-2px);
                box-shadow:0 5px 12px rgba(77,166,255,0.4);
            }

            /* 🔥 ACTIVE BUTTON */
            #menuPopup button:active{
                transform:scale(0.95);
                box-shadow:0 2px 5px rgba(0,0,0,0.3);
            }

            /* ===== TOMBOL KELUAR (SPESIAL) ===== */
            #menuPopup button:last-child{
                background:#ff4d4d;
            }

            #menuPopup button:last-child:hover{
                background:#ff1a1a;
                box-shadow:0 5px 15px rgba(255,0,0,0.5);
            }

            #menuPopup button:last-child:active{
                transform:scale(0.92);
                box-shadow:0 0 8px rgba(255,0,0,0.7);
            }

            /* link di dalam tombol */
            #menuPopup a{
                color:white;
                text-decoration:none;
            }

            #penjelasan{
                bottom:100px;
            }

            /* penjelasan naik sedikit */
            #penjelasan{
                width:90%;
                bottom:75px;
                font-size:13px;
            }
            
        }
            
    </style>
</head>

<body>
    <div id="sceneContainer">
        <div id="judul">Simulasi Model Atom</div>

        <div id="menu">
            <button onclick="dalton()">Dalton</button>
            <button onclick="thomson()">Thomson</button>
            <button onclick="rutherford()">Rutherford</button>
            <button onclick="bohr()">Bohr</button>
            <button onclick="mekanikaKuantum()">Kuantum</button>
            <button onclick="keluar()"><a href="simulasi.html">Keluar</a></button>
        </div>

        <!-- HAMBURGER BUTTON -->
        <div id="hamburger" onclick="toggleMenu()">☰</div>

        <!-- POPUP MENU -->
        <div id="menuPopup">
            <button onclick="dalton()">Dalton</button>
            <button onclick="thomson()">Thomson</button>
            <button onclick="rutherford()">Rutherford</button>
            <button onclick="bohr()">Bohr</button>
            <button onclick="mekanikaKuantum()">Kuantum</button>
            <button onclick="keluar()"><a href="simulasi.html">Keluar</a></button>
        </div>

        <div id="penjelasan">
            Klik model atom untuk melihat simulasi
        </div>
        <div id="popup">
        </div>
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

    function toggleMenu(){
        const menu = document.getElementById("menuPopup");
        menu.classList.toggle("active");
    }

    let clickable = []; // objek yang bisa diklik
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth/window.innerHeight,
        0.1,
        1000
    );

    camera.position.z = 6;
    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);
    document.getElementById("sceneContainer").appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera,renderer.domElement);

    let atomGroup = new THREE.Group();
    scene.add(atomGroup);

    const light1 = new THREE.PointLight(0xffffff,1);
    light1.position.set(5,5,5);
    scene.add(light1);

    scene.add(new THREE.AmbientLight(0x404040));

    function clearAtom(){
        scene.remove(atomGroup);
        atomGroup = new THREE.Group();
        scene.add(atomGroup);

        // reset objek klik
        clickable = [];
    }

    function dalton(){
        clearAtom();
        const sphere = new THREE.Mesh(
            new THREE.SphereGeometry(1.5,64,64),
            new THREE.MeshPhongMaterial({color:0x4da6ff})
        );

        atomGroup.add(sphere);

        document.getElementById("penjelasan").innerHTML =
        "Model Dalton: Atom adalah bola pejal yang tidak dapat dibagi lagi.";

    }

    /* THOMSON */
    function createPlus(){
        const group = new THREE.Group();
        const bar1 = new THREE.Mesh(
            new THREE.BoxGeometry(0.3,0.08,0.08),
            new THREE.MeshBasicMaterial({color:0xffffff})
        );

        const bar2 = new THREE.Mesh(
            new THREE.BoxGeometry(0.08,0.3,0.08),
            new THREE.MeshBasicMaterial({color:0xffffff})
        );

        group.add(bar1);
        group.add(bar2);

        return group;
    }

    // lingkaran + tanda minus
    function createElectron(){

        const group = new THREE.Group();

        // bola biru
        const circle = new THREE.Mesh(
            new THREE.SphereGeometry(0.18,32,32),
            new THREE.MeshBasicMaterial({color:0x1e90ff})
        );

        // tanda minus (dibuat lebih besar & di depan)
        const minus = new THREE.Mesh(
            new THREE.BoxGeometry(0.22,0.05,0.02),
            new THREE.MeshBasicMaterial({color:0xffffff})
        );

        // posisikan sedikit ke depan agar tidak tertutup
        minus.position.z = 0.18;

        group.add(circle);
        group.add(minus);

        return group;
    }

    function randomTidakNumpuk(radius, existing, minDistance){
        let pos;
        let aman;
        do{
            pos = randomDalamBola(radius);
            aman = true;
            for(let p of existing){
                let dx = pos.x - p.x;
                let dy = pos.y - p.y;
                let dz = pos.z - p.z;
                let jarak = Math.sqrt(dx*dx + dy*dy + dz*dz);
                if(jarak < minDistance){
                    aman = false;
                    break;
                }
            }
        } while(!aman);
        return pos;
    }

    function randomDalamBola(radius){
        let x,y,z;
        do{
            x = (Math.random()*2 - 1) * radius;
            y = (Math.random()*2 - 1) * radius;
            z = (Math.random()*2 - 1) * radius;
        } while (x*x + y*y + z*z > radius*radius);
        return {x,y,z};
    }

    function thomson(){
        clearAtom();

        // Bola positif (seperti gambar, merah transparan)
        const sphere = new THREE.Mesh(
            new THREE.SphereGeometry(2,64,64),
            new THREE.MeshBasicMaterial({
                color:0xff4d4d,
                transparent:true,
                opacity:0.7
            })
        );

        atomGroup.add(sphere);

        // ELEKTRON
        let posisiTerpakai = [];

        for(let i=0;i<15;i++){
            const electron = createElectron();
            const pos = randomTidakNumpuk(1.8, posisiTerpakai, 0.35);
            electron.position.set(pos.x,pos.y,pos.z);
            posisiTerpakai.push(pos);
            electron.userData = {type:"electron"};
            atomGroup.add(electron);
            clickable.push(electron);
        }
        // PROTON
        let posisiProton = [];

        for(let i=0;i<15;i++){
            const proton = createPlus();
            const pos = randomTidakNumpuk(1.8, posisiProton, 0.4);
            proton.position.set(pos.x,pos.y,pos.z);
            posisiProton.push(pos);
            proton.userData = {type:"proton"};
            atomGroup.add(proton);
            clickable.push(proton);
        }

        document.getElementById("penjelasan").innerHTML =
        "Model Thomson: elektron tersebar dalam bola bermuatan positif.";

    }

    function rutherford(){
        clearAtom();

        // ===== NUKLEUS =====
        function buatProton(x,y,z){
            const p = new THREE.Mesh(
                new THREE.SphereGeometry(0.25,32,32),
                new THREE.MeshPhongMaterial({color:0xff4d4d})
            );
            p.position.set(x,y,z);
            p.userData = {type:"proton"};
            atomGroup.add(p);
            clickable.push(p);
        }

        function buatNeutron(x,y,z){
            const n = new THREE.Mesh(
                new THREE.SphereGeometry(0.25,32,32),
                new THREE.MeshPhongMaterial({color:0x3399ff})
            );
            n.position.set(x,y,z);
            n.userData = {type:"neutron"};
            atomGroup.add(n);
            clickable.push(n);
        }

        // susunan inti
        buatProton(0,0,0);
        buatProton(0.4,0,0);
        buatProton(-0.4,0,0);

        buatNeutron(0,0.4,0);
        buatNeutron(0,-0.4,0);
        buatNeutron(0,0,0.4);

        // ===== ORBIT + ELEKTRON =====
        let electrons = [];

        function buatOrbitDenganElektron(rotX, rotY, speed){

            const group = new THREE.Group();

            // orbit
            const orbit = new THREE.Mesh(
                new THREE.TorusGeometry(2,0.02,16,100),
                new THREE.MeshBasicMaterial({color:0x8888ff})
            );
            group.add(orbit);

            // elektron
            const e = new THREE.Mesh(
                new THREE.SphereGeometry(0.18,32,32),
                new THREE.MeshBasicMaterial({color:0xffff00})
            );

            e.userData = {
                type:"electron",
                angle: Math.random()*Math.PI*2,
                speed: speed
            };

            group.add(e);

            group.rotation.x = rotX;
            group.rotation.y = rotY;

            atomGroup.add(group);

            clickable.push(e);
            electrons.push({mesh:e, group:group});
        }

        // 3 orbit = 3 elektron
        buatOrbitDenganElektron(0,0,0.02);
        buatOrbitDenganElektron(Math.PI/2,0,0.015);
        buatOrbitDenganElektron(0,Math.PI/2,0.01);

        // ===== ANIMASI =====
        const oldAnimate = animate;

        animate = function(){
            requestAnimationFrame(animate);

            electrons.forEach(obj=>{
                const e = obj.mesh;

                e.userData.angle += e.userData.speed;

                // gerak di bidang orbit (local group)
                const r = 2;

                e.position.set(
                    Math.cos(e.userData.angle) * r,
                    Math.sin(e.userData.angle) * r,
                    0
                );
            });

            atomGroup.rotation.y += 0.003;
            controls.update();
            renderer.render(scene,camera);
        };

        document.getElementById("penjelasan").innerHTML =
        "Model Rutherford: inti atom berisi proton (+) dan neutron, elektron bergerak pada lintasan mengelilingi inti.";

    }

    function bohr(){
        clearAtom();

        // ===== NUKLEUS (PROTON + NEUTRON) =====
        function buatProton(x,y,z){
            const p = new THREE.Mesh(
                new THREE.SphereGeometry(0.25,32,32),
                new THREE.MeshPhongMaterial({color:0xff4d4d})
            );
            p.position.set(x,y,z);
            p.userData = {type:"proton"};
            atomGroup.add(p);
            clickable.push(p);
        }

        function buatNeutron(x,y,z){
            const n = new THREE.Mesh(
                new THREE.SphereGeometry(0.25,32,32),
                new THREE.MeshPhongMaterial({color:0x3399ff})
            );
            n.position.set(x,y,z);
            n.userData = {type:"neutron"};
            atomGroup.add(n);
            clickable.push(n);
        }

        // inti
        buatProton(0,0,0);
        buatProton(0.4,0,0);
        buatProton(-0.3,0.2,0);

        buatNeutron(0,-0.4,0);
        buatNeutron(0.2,0.3,0);
        buatNeutron(-0.2,-0.2,0);

        // ===== ELEKTRON + ORBIT (MENEMPEL) =====
        let electrons = [];

        function buatKulit(radius, jumlah, speed){

            const group = new THREE.Group();

            // orbit
            const orbit = new THREE.Mesh(
                new THREE.TorusGeometry(radius,0.015,16,100),
                new THREE.MeshBasicMaterial({color:0xcccccc})
            );
            group.add(orbit);

            // elektron
            for(let i=0;i<jumlah;i++){

                const e = new THREE.Mesh(
                    new THREE.SphereGeometry(0.15,32,32),
                    new THREE.MeshBasicMaterial({color:0xffff00})
                );

                e.userData = {
                    type:"electron",
                    angle:(i/jumlah)*Math.PI*2,
                    speed:speed,
                    radius:radius
                };

                group.add(e);
                clickable.push(e);
                electrons.push({mesh:e, group:group});
            }

            atomGroup.add(group);
        }

        // 2 - 8 - 3
        buatKulit(1.5, 2, 0.02);  // kulit K
        buatKulit(2.5, 8, 0.015); // kulit L
        buatKulit(3.5, 3, 0.01);  // kulit M


        // ===== ANIMASI (INI KUNCI UTAMA) =====
        const oldAnimate = animate;

        animate = function(){
            requestAnimationFrame(animate);

            electrons.forEach(obj=>{
                const e = obj.mesh;

                e.userData.angle += e.userData.speed;

                const r = e.userData.radius;

                // gerak MELINGKAR di orbit (local group)
                e.position.set(
                    Math.cos(e.userData.angle) * r,
                    Math.sin(e.userData.angle) * r,
                    0
                );
            });

            atomGroup.rotation.y += 0.002;
            controls.update();
            renderer.render(scene,camera);
        };

        document.getElementById("penjelasan").innerHTML =
        "Model Bohr: elektron berada pada kulit energi (2, 8, 3) dan mengelilingi inti atom.";

    }

    function mekanikaKuantum(){

        clearAtom();

        // ===== NUKLEUS =====
        function buatProton(x,y,z){
            const p = new THREE.Mesh(
                new THREE.SphereGeometry(0.25,32,32),
                new THREE.MeshPhongMaterial({color:0xff4d4d})
            );
            p.position.set(x,y,z);
            p.userData = {type:"proton"};
            atomGroup.add(p);
            clickable.push(p);
        }

        function buatNeutron(x,y,z){
            const n = new THREE.Mesh(
                new THREE.SphereGeometry(0.25,32,32),
                new THREE.MeshPhongMaterial({color:0x3399ff})
            );
            n.position.set(x,y,z);
            n.userData = {type:"neutron"};
            atomGroup.add(n);
            clickable.push(n);
        }

        // inti
        buatProton(0,0,0);
        buatProton(0.3,0,0);
        buatProton(-0.3,0.2,0);

        buatNeutron(0,-0.3,0);
        buatNeutron(0.2,0.3,0);
        buatNeutron(-0.2,-0.2,0);

        // ===== AWAN ELEKTRON (ORBITAL) =====
        function buatAwan(radius, jumlah){

            const geometry = new THREE.SphereGeometry(0.05,8,8);

            for(let i=0;i<jumlah;i++){

                const material = new THREE.MeshBasicMaterial({
                    color:0x66ccff,
                    transparent:true,
                    opacity:0.6 // lebih terlihat
                });

                const partikel = new THREE.Mesh(geometry, material);

                // distribusi lebih padat di tengah (biar realistis)
                const r = radius * Math.pow(Math.random(), 0.5);
                const theta = Math.random() * 2 * Math.PI;
                const phi = Math.acos(2*Math.random() - 1);

                partikel.position.set(
                    r * Math.sin(phi) * Math.cos(theta),
                    r * Math.sin(phi) * Math.sin(theta),
                    r * Math.cos(phi)
                );

                partikel.userData = {type:"elektron"};

                atomGroup.add(partikel);
                clickable.push(partikel);
            }
        }

        // efek glow ringan
        const glowLight = new THREE.PointLight(0x66ccff, 1, 10);
        glowLight.position.set(0,0,0);
        atomGroup.add(glowLight);

        // beberapa orbital (seperti s-orbital)
        buatAwan(1.5, 300);
        buatAwan(2.5, 500);

        // ===== ANIMASI (getaran awan) =====
        const oldAnimate = animate;

        animate = function(){
            requestAnimationFrame(animate);

            // efek "hidup" (awan bergerak halus)
            atomGroup.children.forEach(obj=>{
                if(obj.userData.type === "elektron"){
                    obj.position.x += (Math.random()-0.5)*0.02;
                    obj.position.y += (Math.random()-0.5)*0.02;
                    obj.position.z += (Math.random()-0.5)*0.02;
                }
            });

            atomGroup.rotation.y += 0.001;
            controls.update();
            renderer.render(scene,camera);
        };

        document.getElementById("penjelasan").innerHTML =
        "Model Mekanika Kuantum: elektron tidak memiliki lintasan pasti, melainkan berada dalam orbital (awan probabilitas).";

    }

    function animate(){

        requestAnimationFrame(animate);
        atomGroup.rotation.y += 0.003;
        controls.update();
        renderer.render(scene,camera);

    }

    window.addEventListener("click",(event)=>{

        mouse.x = (event.clientX / window.innerWidth)*2 - 1;
        mouse.y = -(event.clientY / window.innerHeight)*2 + 1;
        raycaster.setFromCamera(mouse,camera);
        const intersects = raycaster.intersectObjects(clickable,true);

        if(intersects.length > 0){
            const obj = intersects[0].object; // karena pakai group
            let text = "";

            if(obj.userData.type === "electron"){
                text = "Elektron (-): partikel bermuatan negatif.";
            }

            if(obj.userData.type === "proton"){
                text = "Muatan positif (+): tersebar dalam atom Thomson.";
            }

            if(obj.userData.type === "neutron"){
                text = "Neutron: partikel netral (tidak bermuatan) di inti atom.";
            }

            if(obj.userData.type === "elektron"){
                text = "Elektron: berada dalam orbital (awan probabilitas), tidak memiliki lintasan pasti.";
            }

            const popup = document.getElementById("popup");

            popup.innerHTML = text;
            popup.style.left = event.clientX + "px";
            popup.style.top = event.clientY + "px";
            popup.style.display = "block";

            // hilang otomatis
            setTimeout(()=>{
                popup.style.display = "none";
            },2000);
        }
    });

    animate();

    function resizeRenderer(){
        const width = window.innerWidth;
        const height = window.innerHeight;

        renderer.setSize(width, height);

        camera.aspect = width / height;
        camera.updateProjectionMatrix();
    }

    window.addEventListener("resize", resizeRenderer);
    resizeRenderer();

    camera.position.set(0, 0, 8);

    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // batasi zoom biar tidak hilang
    controls.minDistance = 3;
    controls.maxDistance = 15;

    controls.enableZoom = true;
    controls.enablePan = false;

    
    document.addEventListener("contextmenu", e => e.preventDefault());

    document.onkeydown = function(e) {
    if (e.keyCode == 123) return false; // F12
    if (e.ctrlKey && e.shiftKey && e.keyCode == 73) return false; // Ctrl+Shift+I
    if (e.ctrlKey && e.keyCode == 85) return false; // Ctrl+U
    };
</script>

</body>
</html>
