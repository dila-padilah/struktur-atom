<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <title>Materi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            align-items: center;
            padding: 15px, 30px;
            background: linear-gradient(135deg, #0f2a44, #1c4f80);
            color: white;
            position: relative;
            width: 100%;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            position: relative;
        }

        .navbar::after{
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 0;
            background: white;
            animation: lineGrow 2s forwards;
        }

        @keyframes lineGrow{
            form{width:0}
            to{width: 100%}
        }

        html, body {
            height: 100%;
        }
        body {
            background-color: #dbe3ef;
            background-size: cover;
            background-attachment: fixed;
            height: 100hv;
            overflow: hidden;
            flex-direction: column;
            display: flex;
        }
        header {
            background-color: #1f4a85;
            display: flex;
            margin: 0;
            padding: 0;
            flex: 0 0 auto;
            align-items: center;
        }
        .halaman {
            align-items: center;
            justify-content: right;
            display: flex;
        }
        .logo {
            width: 30%;
            align-items: center;
        }
        .logo img{
            width: 20%;
        }
        .nama {
            padding: 5px;
            font-family:Verdana, Geneva, Tahoma, sans-serif;
            color:white;
            font-size: 20px;
            font-weight: 600;
            margin: auto;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 3s steps(20, end) forwards, blink 0.8s infinite;
        }

        @keyframes typing{
            form{width:0}
            to{width: 70%;}
        }

        @keyframes blink{
            50%{border-color: transparent;}
        }

        /* MENU */
        .menu-container {
            margin-left: auto;
            text-align: right;
            justify-content: right;
            z-index: 9999;
        }
        .menu {
            display: flex;
            gap: 30px;
            margin: 15px;
            list-style: none;
            margin-left: auto;
            z-index: 9999;
        }

        /* LINK */
        .menu a{
            text-decoration: none;
            color: white;
            padding: 8px 18px;
            border-radius: 25px;
            transition: 0.3s;
        }

        .menu ul li {
            white-space: nowrap;
            font-size: 15px;
        }
        
        /* HOVER */
        .menu a:hover{
            background: white;
            color: #0f2a44;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        /* HAMBURGER */
        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .menu-toggle span{
            width: 25px;
            height: 3px;
            background: white;
            border-radius: 2px;
        }

        
        main {
            background-image: url(bg_transparant.png);
            background-size: cover;
            background-attachment: fixed;
            border-radius: 20px;
            border: 3px solid #1f4a85;
            margin: 15px;
            flex: 1 1 auto;
            overflow-y: auto;
            scroll-behavior:smooth ;
            min-height: 0;
            padding: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            line-height: 1.7;
            animation: fade 0.6s ease;
        }
        @keyframes fade{
            form{
                opacity:0; 
                transform:translateY(20px);
            }
            to{
                opacity:1; 
                transform:translateY(0);
            }
        }
        main::-webkit-scrollbar {
            width: 0;
        }
        main::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50px;
        }
        footer {
            background-color: #1f4a85;
            margin: -5px;
            padding: 5px 0;
            align-items: center;
            text-align: center;
            justify-content: center;
            flex: 0 0 auto;
        }
        footer * {
            margin-bottom: 0;
            margin-top: 0;
        }
        .hakcipta {
            margin: 0;
        }
        .sosial_media {
            display: flex;
            text-align: center;
            justify-content: center;
            margin: 0;
        }
        .sosial_media img {
            width: 12%;
            text-align: right;
            cursor: pointer;
            transition: 0.1s;
        }
        .sosial_media img:hover{
            transform: scale(1.2);
        }

        .opsi1{
            display: flex;
            align-items: center;
            text-align: center;
        }
        .container{
            width: 33.3%;
        }
        .opsi2{
            display: flex;
            align-items: center;
            text-align: center;
            justify-content: center;
            margin-top: 50px;
        }
        .container img{
            width: 50%;
            border: 5px solid white;
            border-radius: 15px;
            transition: transform 0.4s ease;
            animation: floatImage 4s ease-in-out infinite;
        }
        .container img:hover{
            transform: scale(1.05);
        }
        @keyframes floatImage {
            0%{
                transform: translateY(0px);
            }
            50%{
                transform: translateY(-10px);
            }
            100%{
                transform: translateY(0px);
            }
        }
        .container h3{
            font-weight: 600;
            color: #0f2a44;
            animation: fadeUp 1.5s ease;
        }
        @keyframes fadeUp{
            from{
                opacity: 0;
                transform: translateY(20px);
            }
            to{
                opacity: 1;
                transform: translateY(0);
            }
        }
        .gambar{
            width: 50%;
            position: relative;
            display: inline-block;
            border-radius: 15px;
            box-shadow: 0 0 20px #1c4f80;
        }
        .gambar img{
            display: block;
            width: 100%;
        }
        .gambar::before{
            content: "";
            position: absolute;
            inset: -3px;
            border-radius: 18px;
            background: linear-gradient(
                90deg,
                transparent,
                #1f4a85,
                #0f2a44,
                #1c4f80,
                transparent
            );
            background-size: 300% 300%;
            animation: electricMove 3s linear infinite;
            filter: blur(6px);
            z-index: -1;
        }
        @keyframes electricMove{
            0%{
                background-position: 0% 50%;
            }
            100%{
                background-position: 300% 50%;
            }
        }

        /* RESPONSIVE */
        @media (max-width: 768px){
            .menu {
                position: absolute;
                top: 70px;
                right: 0;
                background: #0f2a44;
                width: 220px;
                flex-direction: column;
                text-align: center;
                padding: 20px;
                display: none;
                border-radius: 0 0 10px 10px;
            }

            .menu li{
                margin: 10px 0;
            }

            .menu-toggle{
                display: flex;
            }

            .menu.active {
                display: flex;
            }
            .opsi1{
                flex-direction: column;
                align-items: center;
                gap: 50px;
            }
             .opsi2{
                flex-direction: column;
                align-items: center;
                gap: 50px;
            }
            .container{
                width: 100%;
            }
            .sosial_media img{
                width: 20%;
            }
        }

    </style>
</head>

<script>
    const toggle = document.getElementById("menu-toggle");
